# 服务器配置
[server]
port = 8889
host = "127.0.0.1"
max_retries = 3
retry_delay = 1000  # 毫秒
request_timeout = 60000  # 毫秒

# 模型供应商配置
# 注意：API密钥由客户端在请求时通过 Authorization 头传入
# 模型列表从上游供应商 API 动态获取

[zhipu]
api_url = "https://open.bigmodel.cn/api/paas/v4"
type = "zhipu"

[kimi]
api_url = "https://api.moonshot.cn/v1"
type = "kimi"

[deepseek]
api_url = "https://api.deepseek.com"
type = "deepseek"

[t8star]
api_url = "https://ai.t8star.cn/v1"
type = "t8star"

[kuai]
api_url = "https://api.kuai.host/v1"
type = "openai"

[aicoding]
api_url = "https://api.aicoding.sh"
type = "claude"  # 使用 Claude Messages API 格式

# 示例：添加新供应商配置
# [new_provider]
# api_url = "https://api.new-provider.com/v1"
# type = "openai"  # 或其他兼容类型
